services:
  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: backend
    container_name: django_app
    command: sh /app/entrypoint.sh
    volumes:
      - ../backend:/app
      - ./entrypoint.sh:/app/entrypoint.sh
    expose:
      - "8000"
    env_file:
      - ../.env
    environment:
      - DEBUG=True
    restart: unless-stopped

  nginx:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      target: nginx
    container_name: nginx_proxy
    ports:
      - "8000:8000"
    depends_on:
      - web
    restart: unless-stopped