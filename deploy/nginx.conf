server {
    listen 8000;
    listen [::]:8000;

    server_name _;
    client_max_body_size 10M;

    location /pos/             { rewrite ^/pos/(.*)$             /dashboard/pos/$1             last; }
    location /orders/          { rewrite ^/orders/(.*)$          /dashboard/orders/$1          last; }
    location /foods/           { rewrite ^/foods/(.*)$           /dashboard/foods/$1           last; }
    location /recipes/         { rewrite ^/recipes/(.*)$         /dashboard/recipes/$1         last; }
    location /raw-materials/   { rewrite ^/raw-materials/(.*)$   /dashboard/raw-materials/$1   last; }
    location /semi-finished/   { rewrite ^/semi-finished/(.*)$   /dashboard/semi-finished/$1   last; }
    location /ready-materials/ { rewrite ^/ready-materials/(.*)$ /dashboard/ready-materials/$1 last; }
    location /invoices/        { rewrite ^/invoices/(.*)$        /dashboard/invoices/$1        last; }
    location /usage-log/       { rewrite ^/usage-log/(.*)$       /dashboard/usage-log/$1       last; }
    location /kitchen/         { rewrite ^/kitchen/(.*)$         /dashboard/kitchen/$1         last; }
    location /loyalty/         { rewrite ^/loyalty/(.*)$         /dashboard/loyalty/$1         last; }

    location /admin/ {
        proxy_pass http://web:8000/admin/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /users/ {
        proxy_pass http://web:8000/users/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /api/ {
        proxy_pass http://web:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location /static/ {
        proxy_pass http://web:8000/static/;
        proxy_set_header Host $host;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location /media/ {
        proxy_pass http://web:8000/media/;
        proxy_set_header Host $host;
        expires 7d;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}