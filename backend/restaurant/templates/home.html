<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>رستوران ما</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Tahoma, sans-serif;
            min-height: 100vh;
            background: #0a0a0a;
            color: #f0ece4;
            overflow: hidden;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            background:
                radial-gradient(ellipse at 20% 50%, #1a0a2e 0%, transparent 50%),
                radial-gradient(ellipse at 80% 20%, #0d2b1a 0%, transparent 50%),
                radial-gradient(ellipse at 50% 80%, #2e0a0a 0%, transparent 40%),
                #0a0a0a;
        }

        .particle {
            position: fixed;
            border-radius: 50%;
            pointer-events: none;
            z-index: 1;
        }

        .particle:nth-child(1) {
            width: 300px;
            height: 300px;
            background: radial-gradient(circle, rgba(232, 197, 71, 0.08) 0%, transparent 70%);
            top: -100px;
            right: -100px;
            animation: float1 8s ease-in-out infinite;
        }

        .particle:nth-child(2) {
            width: 200px;
            height: 200px;
            background: radial-gradient(circle, rgba(232, 197, 71, 0.05) 0%, transparent 70%);
            bottom: -50px;
            left: 10%;
            animation: float2 10s ease-in-out infinite;
        }

        @keyframes float1 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(-40px, 60px) scale(1.1); }
        }

        @keyframes float2 {
            0%, 100% { transform: translate(0, 0) scale(1); }
            50% { transform: translate(50px, -40px) scale(1.15); }
        }

        .container {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            text-align: center;
        }

        .logo {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background: linear-gradient(135deg, #e8c547 0%, #ff6b35 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 48px;
            margin-bottom: 30px;
            opacity: 0;
            animation: fadeInDown 0.8s ease forwards;
        }

        h1 {
            font-size: 3.5rem;
            font-weight: 800;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #e8c547 0%, #ff6b35 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.3s forwards;
        }

        .subtitle {
            font-size: 1.2rem;
            color: #7a7570;
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.5s forwards;
        }

        .divider {
            width: 80px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #e8c547, transparent);
            margin-bottom: 50px;
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.6s forwards;
        }

        .btn {
            padding: 16px 50px;
            border-radius: 50px;
            font-family: Tahoma, sans-serif;
            font-size: 1.1rem;
            font-weight: bold;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #e8c547 0%, #ff6b35 100%);
            color: #0a0a0a;
            border: none;
            box-shadow: 0 4px 30px rgba(232, 197, 71, 0.3);
            opacity: 0;
            animation: fadeInUp 0.8s ease 0.7s forwards;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 40px rgba(232, 197, 71, 0.5);
        }

        .footer {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            text-align: center;
            padding: 20px;
            color: #3a3a3a;
            font-size: 0.8rem;
            z-index: 2;
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes fadeInDown {
            from { opacity: 0; transform: translateY(-30px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="bg-animation"></div>
    <div class="particle"></div>
    <div class="particle"></div>

    <div class="container">
        <div class="logo">🍽</div>
        <h1>رستوران ما</h1>
        <p class="subtitle">خوش آمدید</p>
        <div class="divider"></div>
        <a href="{% url 'admin:index' %}" class="btn">ورود به پنل مدیریت</a>
    </div>

    <div class="footer">© 2026 تمام حقوق محفوظ است</div>

</body>
</html>
