<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
  <title>ورود | رستوران</title>
  <!-- ← فونت از CDN جایگزین (رایگان و بدون فیلتر) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/rastikerdar/vazirmatn@v33.003/Vazirmatn-font-face.css">
<style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Vazirmatn', sans-serif;
      min-height: 100vh;
      display: flex;
      direction: rtl;
    }

    .panel-left {
      flex: 1;
      background: linear-gradient(135deg, #0f0f23 0%, #1a1a3e 30%, #16213e 60%, #0f3460 100%);
      display: flex;
      align-items: center;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }
    .panel-left::before {
      content: '';
      position: absolute;
      top: -200px; left: -200px;
      width: 600px; height: 600px;
      background: radial-gradient(circle, rgba(255, 107, 53, 0.15) 0%, transparent 70%);
      animation: float1 8s ease-in-out infinite;
    }
    .panel-left::after {
      content: '';
      position: absolute;
      bottom: -150px; right: -100px;
      width: 500px; height: 500px;
      background: radial-gradient(circle, rgba(124, 58, 237, 0.12) 0%, transparent 70%);
      animation: float2 10s ease-in-out infinite;
    }
    @keyframes float1 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(60px, 40px); }
    }
    @keyframes float2 {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(-40px, -60px); }
    }
    .brand {
      position: relative; z-index: 1;
      text-align: center; padding: 40px;
    }
    .brand-icon {
      width: 100px; height: 100px;
      background: rgba(255, 255, 255, 0.05);
      border: 2px solid rgba(255, 255, 255, 0.1);
      border-radius: 30px;
      display: flex; align-items: center; justify-content: center;
      font-size: 48px; margin: 0 auto 32px;
      backdrop-filter: blur(10px);
      animation: pulse 3s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); box-shadow: 0 0 0 0 rgba(255,107,53,0.2); }
      50% { transform: scale(1.05); box-shadow: 0 0 30px 10px rgba(255,107,53,0.1); }
    }
    .brand h1 {
      color: #fff; font-size: 32px; font-weight: 900; margin-bottom: 12px;
    }
    .brand h1 em {
      font-style: normal;
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .brand p {
      color: rgba(255, 255, 255, 0.4); font-size: 14px; line-height: 2;
    }
    .features {
      position: relative; z-index: 1;
      margin-top: 48px; display: flex;
      flex-direction: column; gap: 20px;
    }
    .feat {
      display: flex; align-items: center; gap: 14px;
      color: rgba(255, 255, 255, 0.6); font-size: 13px; font-weight: 500;
    }
    .feat-ico {
      width: 40px; height: 40px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; flex-shrink: 0;
    }

    .panel-right {
      width: 520px; background: #fafbfc;
      display: flex; align-items: center;
      justify-content: center; position: relative;
      overflow-y: auto;
    }
    .form-container {
      width: 100%; max-width: 420px; padding: 40px;
    }
    .form-header { margin-bottom: 36px; }
    .form-header h2 {
      font-size: 28px; font-weight: 900;
      color: #1e1e2d; margin-bottom: 8px;
    }
    .form-header p { font-size: 13px; color: #8e8ea0; }

    .tabs {
      display: flex; background: #fff;
      border-radius: 16px; padding: 5px;
      margin-bottom: 32px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.04);
      border: 1px solid #ecedf0;
    }
    .tab-btn {
      flex: 1; padding: 12px; text-align: center;
      font-size: 14px; font-weight: 700; color: #8e8ea0;
      background: transparent; border: none; border-radius: 12px;
      cursor: pointer; transition: all 0.3s;
      font-family: 'Vazirmatn', sans-serif;
    }
    .tab-btn.active {
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      color: #fff; box-shadow: 0 4px 14px rgba(255, 107, 53, 0.3);
    }

    .form-panel { display: none; }
    .form-panel.active {
      display: block; animation: fadeIn 0.4s ease;
    }
    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to { opacity: 1; transform: translateY(0); }
    }

    .field { margin-bottom: 20px; }
    .field label {
      display: block; font-size: 12px; font-weight: 700;
      color: #555; margin-bottom: 8px;
    }
    .input-wrap { position: relative; }
    .input-wrap input {
      width: 100%; padding: 14px 16px 14px 48px;
      font-size: 14px; font-family: 'Vazirmatn', sans-serif;
      border: 2px solid #e8e8ed; border-radius: 14px;
      background: #fff; color: #1e1e2d;
      transition: all 0.25s; outline: none;
    }
    .input-wrap input:focus {
      border-color: #ff6b35;
      box-shadow: 0 0 0 4px rgba(255, 107, 53, 0.1);
    }
    .input-wrap input::placeholder { color: #b4b4c6; }
    .input-ico {
      position: absolute; left: 16px; top: 50%;
      transform: translateY(-50%);
      font-size: 18px; opacity: 0.4; pointer-events: none;
    }
    .input-wrap input:focus ~ .input-ico { opacity: 0.8; }
    .toggle-pass {
      position: absolute; left: 48px; top: 50%;
      transform: translateY(-50%);
      background: none; border: none;
      font-size: 16px; cursor: pointer;
      opacity: 0.4; padding: 4px;
    }
    .toggle-pass:hover { opacity: 0.8; }

    .btn-primary {
      width: 100%; padding: 16px; font-size: 15px;
      font-weight: 800; font-family: 'Vazirmatn', sans-serif;
      color: #fff;
      background: linear-gradient(135deg, #ff6b35, #f7931e);
      border: none; border-radius: 14px; cursor: pointer;
      transition: all 0.3s;
      box-shadow: 0 4px 14px rgba(255, 107, 53, 0.3);
      margin-top: 8px;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(255, 107, 53, 0.4);
    }
    .btn-primary:active { transform: translateY(0); }
    .btn-primary:disabled {
      opacity: 0.6; cursor: not-allowed; transform: none;
    }
    .btn-primary .spinner {
      display: none; width: 20px; height: 20px;
      border: 3px solid rgba(255,255,255,0.3);
      border-top-color: #fff; border-radius: 50%;
      animation: spin 0.8s linear infinite; margin: 0 auto;
    }
    .btn-primary.loading .btn-text { display: none; }
    .btn-primary.loading .spinner { display: block; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .msg {
      padding: 12px 16px; border-radius: 12px;
      font-size: 13px; font-weight: 600;
      margin-bottom: 20px; display: none;
      animation: fadeIn 0.3s ease;
    }
    .msg.show { display: flex; align-items: center; gap: 8px; }
    .msg.error { background: #fef2f2; color: #dc2626; border: 1px solid #fecaca; }
    .msg.success { background: #ecfdf5; color: #059669; border: 1px solid #a7f3d0; }
    .msg.pending {
      background: #fffbeb; color: #d97706;
      border: 1px solid #fde68a;
    }

    .divider {
      display: flex; align-items: center; gap: 16px; margin: 24px 0;
    }
    .divider::before, .divider::after {
      content: ''; flex: 1; height: 1px; background: #e8e8ed;
    }
    .divider span { font-size: 11px; color: #b4b4c6; font-weight: 600; }

    .form-footer {
      text-align: center; margin-top: 20px;
      font-size: 13px; color: #8e8ea0; padding-bottom: 20px;
    }
    .form-footer a {
      color: #ff6b35; text-decoration: none; font-weight: 700;
    }
    .form-footer a:hover { text-decoration: underline; }

    @media (max-width: 900px) {
      body { flex-direction: column; overflow-y: auto; overflow-x: hidden; }
      .panel-left { min-height: auto; padding: 28px 20px 24px; flex: none; }
      .brand { padding: 16px; }
      .brand-icon { width: 72px; height: 72px; font-size: 36px; margin-bottom: 18px; }
      .brand h1 { font-size: 22px; margin-bottom: 8px; }
      .brand p { font-size: 13px; line-height: 1.8; }
      .features { display: none; }
      .panel-right { width: 100%; min-height: auto; align-items: flex-start; flex: 1; }
      .form-container { max-width: 100%; padding: 24px 24px 40px; }
    }
    @media (max-width: 480px) {
      .panel-left { padding: 20px 16px 16px; }
      .brand-icon { width: 60px; height: 60px; font-size: 30px; margin-bottom: 12px; border-radius: 20px; }
      .brand h1 { font-size: 20px; }
      .form-container { padding: 20px 18px 36px; }
      .form-header h2 { font-size: 20px; }
      .form-header { margin-bottom: 24px; }
      .tabs { margin-bottom: 24px; border-radius: 12px; padding: 4px; }
      .tab-btn { padding: 10px; font-size: 13px; border-radius: 10px; }
      .input-wrap input { padding: 12px 14px 12px 44px; font-size: 15px; border-radius: 12px; }
      .input-ico { left: 14px; font-size: 16px; }
      .toggle-pass { left: 42px; font-size: 14px; }
      .btn-primary { padding: 14px; font-size: 14px; border-radius: 12px; }
      .field { margin-bottom: 16px; }
      .field label { font-size: 12px; margin-bottom: 6px; }
      .msg { font-size: 12px; padding: 10px 14px; border-radius: 10px; margin-bottom: 14px; }
      .divider { margin: 18px 0; }
      .form-footer { font-size: 12px; margin-top: 16px; }
      .name-grid { grid-template-columns: 1fr !important; gap: 0 !important; }
    }
    @supports (padding-bottom: env(safe-area-inset-bottom)) {
      .form-container { padding-bottom: calc(20px + env(safe-area-inset-bottom)); }
    }
</style>
</head>
<body>

  <div class="panel-left">
    <div class="brand">
      <div class="brand-icon">&#127828;</div>
      <h1>پنل مدیریت <em>رستوران</em></h1>
      <p>منو، سفارشات، انبار، تولید و باشگاه مشتریان</p>
    </div>
    <div class="features">
      <div class="feat"><div class="feat-ico">&#128230;</div><div>مدیریت هوشمند سفارشات و پیگیری لحظه‌ای</div></div>
      <div class="feat"><div class="feat-ico">&#127970;</div><div>کنترل موجودی انبار و هشدار کمبود</div></div>
      <div class="feat"><div class="feat-ico">&#127942;</div><div>باشگاه مشتریان و سیستم وفاداری</div></div>
      <div class="feat"><div class="feat-ico">&#128200;</div><div>گزارش‌های مالی و تحلیل فروش</div></div>
    </div>
  </div>

  <div class="panel-right">
    <div class="form-container">

      <div class="form-header">
        <h2 id="form-title">خوش آمدید</h2>
        <p id="form-subtitle">برای ادامه وارد حساب خود شوید</p>
      </div>
      <div class="msg error" id="msg-error">
        <span>&#9888;</span>
        <span id="msg-error-text"></span>
      </div>
      <div class="msg success" id="msg-success">
        <span>&#10003;</span>
        <span id="msg-success-text"></span>
      </div>
      <div class="msg pending" id="msg-pending">
        <span>&#9203;</span>
        <span id="msg-pending-text"></span>
      </div>

      <!-- ═══ LOGIN ═══ -->
      <div class="form-panel active" id="login-panel">
        <form onsubmit="handleLogin(event)">
          <div class="field">
            <label>نام کاربری یا شماره موبایل</label>
            <div class="input-wrap">
              <input type="text" id="login-username" placeholder="ali یا 09123456789" autocomplete="username" required>
              <span class="input-ico">&#128100;</span>
            </div>
          </div>
          <div class="field">
            <label>رمز عبور</label>
            <div class="input-wrap">
              <input type="password" id="login-password" placeholder="رمز عبور خود را وارد کنید" autocomplete="current-password" required>
              <button type="button" class="toggle-pass" onclick="togglePass('login-password', this)">&#128065;</button>
              <span class="input-ico">&#128274;</span>
            </div>
          </div>
          <button type="submit" class="btn-primary" id="login-btn">
            <span class="btn-text">ورود به حساب</span>
            <div class="spinner"></div>
          </button>
        </form>
        <div class="divider"><span>یا</span></div>
        <div class="form-footer">
          حساب ندارید؟ <a href="#" onclick="switchTab('register'); return false;">ثبت‌نام کنید</a>
        </div>
      </div>

      <!-- ═══ REGISTER ═══ -->

    </div>
  </div>

<script>
  // ═══════════════════════════════════════════════════════════
  //  لایه ۱: API Client
  // ═══════════════════════════════════════════════════════════
  var API_BASE = '/api/auth';

  function getCookie(name) {
    var v = null;
    document.cookie.split(';').forEach(function(c) {
      c = c.trim();
      if (c.startsWith(name + '=')) v = decodeURIComponent(c.slice(name.length + 1));
    });
    return v;
  }

  var api = {
    csrf: function() { return getCookie('csrftoken') || ''; },

    post: async function(url, body) {
      try {
        var res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json', 'X-CSRFToken': api.csrf() },
          body: JSON.stringify(body),
        });
        var data = await res.json().catch(function() { return {}; });
        return { ok: res.ok, data: data };
      } catch (err) {
        return { ok: false, data: {}, networkError: true };
      }
    },
  };

  // ═══════════════════════════════════════════════════════════
  //  لایه ۲: Store
  // ═══════════════════════════════════════════════════════════
  var store = (function() {
    var state = { status: 'idle', message: '', tab: 'login' };
    return {
      get: function() { return state; },
      set: function(patch) {
        state = Object.assign({}, state, patch);
        render(state);
      },
    };
  })();

  // ═══════════════════════════════════════════════════════════
  //  لایه ۳: View — UI = f(state)
  // ═══════════════════════════════════════════════════════════
  function $(id) { return document.getElementById(id); }

  function render(s) {
    // ── پیام‌ها ──
    var box = $('message');
    if (box) {
      box.className = 'message ' + s.status;
      box.textContent = s.message;
      box.hidden = (s.status === 'idle' || s.status === 'loading');
    }

    // ── دکمه‌ها ──
    document.querySelectorAll('button[type="submit"]').forEach(function(btn) {
      btn.disabled = (s.status === 'loading');
      if (s.status === 'loading') btn.classList.add('loading');
      else btn.classList.remove('loading');
    });

    // ── تب‌ها ──
    var isLogin = s.tab === 'login';
    var tabs = document.querySelectorAll('.tab-btn');
    if (tabs[0]) { if (isLogin) tabs[0].classList.add('active'); else tabs[0].classList.remove('active'); }
    if (tabs[1]) { if (!isLogin) tabs[1].classList.add('active'); else tabs[1].classList.remove('active'); }
    var lp = $('login-panel'); if (lp) { if (isLogin) lp.classList.add('active'); else lp.classList.remove('active'); }
    var rp = $('register-panel'); if (rp) { if (!isLogin) rp.classList.add('active'); else rp.classList.remove('active'); }

    // ── عنوان ──
    var ft = $('form-title');
    var fs = $('form-subtitle');
    if (ft) ft.textContent = isLogin ? 'خوش آمدید' : 'ایجاد حساب جدید';
    if (fs) fs.textContent = isLogin ? 'برای ادامه وارد حساب خود شوید' : 'ثبت\u200cنام کنید و از امکانات استفاده کنید';
  }

  // ═══════════════════════════════════════════════════════════
  //  توابع کمکی
  // ═══════════════════════════════════════════════════════════
  var ROUTES = {
    owner: '/admin/',
    manager: '/admin/',
    cashier: '/pos/',
    kitchen: '/kitchen/',
    customer: '/admin/',
  };

  function redirectFor(user) {
    if (!user) return '/auth/';
    return ROUTES[user.role] || '/auth/';
  }

  function buildIdentity(id) {
    return /^09\d{9}$/.test(id) ? { phone_number: id } : { username: id };
  }

  async function persistSession(access, refresh, user) {
    localStorage.setItem('access_token', access);
    localStorage.setItem('refresh_token', refresh);
    localStorage.setItem('user', JSON.stringify(user));
    try {
      await api.post(API_BASE + '/set-session/', {
        access_token: access,
        user_id: user.id,
      });
    } catch (e) {
      // set-session fail → مهم نیست، توکن ذخیره شده
    }
  }

  function switchTab(tab) {
    store.set({ tab: tab, status: 'idle', message: '' });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  function togglePass(inputId, btn) {
    var input = $(inputId);
    var show = input.type === 'password';
    input.type = show ? 'text' : 'password';
    btn.innerHTML = show ? '&#128064;' : '&#128065;';
  }

  // ═══════════════════════════════════════════════════════════
  //  منطق اصلی: ورود
  // ═══════════════════════════════════════════════════════════
  async function handleLogin(e) {
    if (e && e.preventDefault) e.preventDefault();
    store.set({ status: 'loading', message: '' });

    var username = ($('login-username') || {}).value || '';
    var password = ($('login-password') || {}).value || '';
    username = username.trim();

    if (!username || !password) {
      store.set({ status: 'error', message: 'نام کاربری و رمز عبور را وارد کنید.' });
      return;
    }

    var result = await api.post(API_BASE + '/login/', Object.assign(
      buildIdentity(username),
      { password: password }
    ));

    if (result.networkError) {
      store.set({ status: 'error', message: 'خطا در اتصال به سرور.' });
      return;
    }

    var data = result.data;

    // حساب تأیید نشده
    if (data.pending || (data.data && data.data.pending)) {
      store.set({ status: 'pending', message: data.error || data.message || 'حساب شما هنوز توسط مدیر تأیید نشده.' });
      return;
    }

    // خطای ورود
    if (!result.ok || !data.access) {
      store.set({ status: 'error', message: data.error || data.detail || 'خطا در ورود. دوباره تلاش کنید.' });
      return;
    }

    // ورود موفق → ذخیره و هدایت
    var redirectUrl = redirectFor(data.user);
    store.set({ status: 'success', message: 'ورود موفقیت\u200cآمیز! در حال انتقال...' });

    await persistSession(data.access, data.refresh, data.user);

    setTimeout(function() {
      window.location.href = redirectUrl;
    }, 500);
  }

  // ═══════════════════════════════════════════════════════════
  //  منطق اصلی: ثبت‌نام
  // ═══════════════════════════════════════════════════════════
  async function handleRegister(e) {
    if (e && e.preventDefault) e.preventDefault();
    store.set({ status: 'loading', message: '' });

    var username  = (($('reg-username') || {}).value || '').trim();
    var phone     = (($('reg-phone') || {}).value || '').trim();
    var firstName = (($('reg-firstname') || {}).value || '').trim();
    var lastName  = (($('reg-lastname') || {}).value || '').trim();
    var password  = ($('reg-password') || {}).value || '';
    var password2 = ($('reg-password2') || {}).value || '';

    if (password !== password2) {
      store.set({ status: 'error', message: 'رمزهای عبور مطابقت ندارند.' }); return;
    }
    if (password.length < 8) {
      store.set({ status: 'error', message: 'رمز عبور باید حداقل ۸ کاراکتر باشد.' }); return;
    }
    if (!/^09\d{9}$/.test(phone)) {
      store.set({ status: 'error', message: 'شماره موبایل نامعتبر است.' }); return;
    }

    var result = await api.post(API_BASE + '/register/', {
      username: username,
      phone_number: phone,
      first_name: firstName,
      last_name: lastName,
      password: password,
      password_confirm: password2,
      role: 'customer',
    });

    if (result.networkError) {
      store.set({ status: 'error', message: 'خطا در اتصال به سرور.' }); return;
    }

    var data = result.data;

    // ثبت‌نام اما تأیید نشده
    if (data.pending || (data.data && data.data.pending)) {
      store.set({ status: 'pending', message: data.message || 'ثبت\u200cنام انجام شد. پس از تأیید مدیر می\u200cتوانید وارد شوید.' });
      setTimeout(function() { switchTab('login'); }, 3000);
      return;
    }

    // ثبت‌نام و ورود موفق
    if (result.ok && data.data) {
      var tokens = data.data.tokens;
      var user = data.data.user;
      var redirectUrl = redirectFor(user);
      store.set({ status: 'success', message: 'ثبت\u200cنام موفق! در حال انتقال...' });
      await persistSession(tokens.access, tokens.refresh, user);
      setTimeout(function() { window.location.href = redirectUrl; }, 500);
      return;
    }

    // خطای ثبت‌نام
    var errors = data.errors || data;
    var msg = (typeof errors === 'object' && errors !== null)
      ? Object.values(errors).flat().join(' ')
      : (data.error || 'خطا در ثبت\u200cنام.');
    store.set({ status: 'error', message: msg });
  }

  // ═══════════════════════════════════════════════════════════
  //  اتصال به DOM
  // ═══════════════════════════════════════════════════════════
  document.addEventListener('DOMContentLoaded', function() {
    // فرم ورود
    var lf = $('login-form');
    if (lf) lf.addEventListener('submit', handleLogin);

    // فرم ثبت‌نام
    var rf = $('register-form');
    if (rf) rf.addEventListener('submit', handleRegister);

    // دکمه‌های تعویض تب
    document.querySelectorAll('.tab-btn').forEach(function(btn) {
      btn.addEventListener('click', function() { switchTab(btn.dataset.tab); });
    });

    // نمایش/مخفی رمز
    document.querySelectorAll('[data-toggle-pass]').forEach(function(btn) {
      btn.addEventListener('click', function() { togglePass(btn.dataset.togglePass, btn); });
    });

    // Enter
    document.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        var form = document.querySelector('.form-panel.active form');
        if (form) form.dispatchEvent(new Event('submit', { cancelable: true }));
      }
    });

    render(store.get());
  });
</script>

</body>
</html>
