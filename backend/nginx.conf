server {
    listen 80;
    listen [::]:80;

    # ── dashboard → صفحه لاگین ──
    location = /dashboard/       { proxy_pass http://web:8000/auth/;            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── صفحات بک‌اند Django ──
    location /auth/            { proxy_pass http://web:8000/auth/;            proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /admin/           { proxy_pass http://web:8000/admin/;           proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /users/           { proxy_pass http://web:8000/users/;           proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /pos/             { proxy_pass http://web:8000/pos/;             proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /foods/           { proxy_pass http://web:8000/foods/;           proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /kitchen/         { proxy_pass http://web:8000/kitchen/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /recipes/         { proxy_pass http://web:8000/recipes/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /raw-materials/   { proxy_pass http://web:8000/raw-materials/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /semi-finished/   { proxy_pass http://web:8000/semi-finished/;   proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /ready-materials/ { proxy_pass http://web:8000/ready-materials/; proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /invoices/        { proxy_pass http://web:8000/invoices/;        proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /usage-log/       { proxy_pass http://web:8000/usage-log/;       proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /orders/          { proxy_pass http://web:8000/orders/;          proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }
    location /loyalty/         { proxy_pass http://web:8000/loyalty/;         proxy_set_header Host $host; proxy_set_header X-Real-IP $remote_addr; }

    # ── API ──
    location /api/ {
        proxy_pass http://web:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # ── فایل‌های ایستا ──
    location /static/ {
        proxy_pass http://web:8000/static/;
        proxy_set_header Host $host;
    }

    location /media/ {
        proxy_pass http://web:8000/media/;
        proxy_set_header Host $host;
    }

    # ── فرانت‌اند SPA ──
    location / {
        root /usr/share/nginx/html;
        index index.html;
        try_files $uri $uri/ /index.html;
    }
}