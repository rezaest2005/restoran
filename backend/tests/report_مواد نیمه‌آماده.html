<!DOCTYPE html><html lang="fa" dir="rtl"><head><meta charset="UTF-8">
<title>مواد نیمه‌آماده</title><style>
*{margin:0;padding:0;box-sizing:border-box}body{font-family:Tahoma;background:#0f0f23;color:#ccc;padding:40px}
.c{max-width:900px;margin:auto}h1{color:#64ffda;margin-bottom:20px}
.s{display:flex;gap:12px;margin-bottom:20px}.st{background:#1a1a3e;padding:16px;border-radius:10px;flex:1;text-align:center}
.n{font-size:1.8rem;font-weight:900}.p .n{color:#4ecca3}.f .n{color:#e94560}.k .n{color:#f9a825}
table{width:100%;border-collapse:collapse;background:#1a1a3e;border-radius:10px;overflow:hidden}
th{background:#252550;color:#64ffda;padding:12px}td{padding:10px;border-bottom:1px solid #2a2a5a;font-size:13px}
.b{padding:2px 8px;border-radius:4px;font-size:.75rem;font-weight:700}
.b.pass{background:rgba(78,204,163,.15);color:#4ecca3}
.b.fail{background:rgba(233,69,96,.15);color:#e94560}
.b.skip{background:rgba(249,168,37,.15);color:#f9a825}
</style></head><body><div class="c"><h1>مواد نیمه‌آماده</h1>
<div class="s">
<div class="st p"><div class="n">2</div><div>موفق</div></div>
<div class="st f"><div class="n">1</div><div>ناموفق</div></div>
<div class="st k"><div class="n">1</div><div>رد شده</div></div>
</div><table><thead><tr><th>وضعیت</th><th>توضیح</th></tr></thead><tbody>
<tr><td><span class="b pass">PASS</span></td><td>ورود به ادمین موفق</td></tr>
<tr><td><span class="b pass">PASS</span></td><td>صفحه لود شد</td></tr>
<tr><td><span class="b fail">FAIL</span></td><td>نیمه‌آماده: جدول نیست</td></tr>
<tr><td><span class="b skip">SKIP</span></td><td>جدول نیست</td></tr>
</tbody></table></div></body></html>
